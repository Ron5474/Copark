test:auth:
  stage: test
  image: node:lts
  services:
    - name: docker:dind
      command: ["--tls=false"]
  variables:
    PIPELINE: true
    POSTGRES_HOST: ${POSTGRES_HOST}
    POSTGRES_PORT: ${POSTGRES_PORT}
    POSTGRES_DB: ${POSTGRES_DB}
    POSTGRES_USER: ${POSTGRES_USER}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    # MICROSERVICE_INTERNAL_SECRET: not-a-very-secret-secret
    NEXT_PUBLIC_GOOGLE_ID: ${NEXT_PUBLIC_GOOGLE_ID}
    NEXT_PUBLIC_GOOGLE_SECRET: ${NEXT_PUBLIC_GOOGLE_SECRET}
    NEXT_PUBLIC_FACEBOOK_CLIENT_ID: ${NEXT_PUBLIC_FACEBOOK_CLIENT_ID}
    NEXT_PUBLIC_FACEBOOK_SECRET: ${NEXT_PUBLIC_FACEBOOK_SECRET}
    NEXT_PUBLIC_GITHUB_ID: ${NEXT_PUBLIC_GITHUB_ID}
    NEXT_PUBLIC_GITHUB_SECRET: ${NEXT_PUBLIC_GITHUB_SECRET}
    NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: overlay2
  before_script:
    - apt-get update && apt-get install -y docker.io
    - docker --version
  script:
    - docker-compose up --build && npm run test-auth
  rules:
    - changes:
        - microservice/AuthService/**/*
        - package.json
        - .gitlab-ci.yml

test:driver:
  script:
    - cd app/driver && npm install && npm test
  rules:
    - changes: 
      - app/driver/**/*
      - package.json
      - .gitlab-ci.yml

