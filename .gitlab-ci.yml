setup-env-variables:root:
  stage: setup-env-variables
  script:
    - rm -f .env
    - echo "POSTGRES_HOST=${POSTGRES_HOST}" >> .env
    - echo "POSTGRES_PORT=${POSTGRES_PORT}" >> .env
    - echo "POSTGRES_DB=${POSTGRES_DB}" >> .env
    - echo "POSTGRES_AUTH_DB=${POSTGRES_AUTH_DB}" >> .env
    - echo "POSTGRES_VEHICLE_DB=${POSTGRES_VEHICLE_DB}" >> .env
    - echo "POSTGRES_PERMIT_DB=${POSTGRES_PERMIT_DB}" >> .env
    - echo "POSTGRES_TICKET_DB=${POSTGRES_TICKET_DB}" >> .env
    - echo "POSTGRES_USER=${POSTGRES_USER}" >> .env
    - echo "POSTGRES_PASSWORD=${POSTGRES_PASSWORD}" >> .env
    - echo "JWT_SECRET=${JWT_SECRET}" >> .env
    - echo "MICROSERVICE_INTERNAL_SECRET=${MICROSERVICE_INTERNAL_SECRET}" >> .env
  artifacts:
    paths:
      - .env


setup-env-variables:driver-app:
  stage: setup-env-variables
  script:
    - rm -f app/driver/.env
    - echo "NEXT_PUBLIC_GOOGLE_ID=${NEXT_PUBLIC_GOOGLE_ID}" >> app/driver/.env
    - echo "NEXT_PUBLIC_GOOGLE_SECRET=${NEXT_PUBLIC_GOOGLE_SECRET}" >> app/driver/.env
    - echo "NEXT_PUBLIC_FACEBOOK_CLIENT_ID=${NEXT_PUBLIC_FACEBOOK_CLIENT_ID}" >> app/driver/.env
    - echo "NEXT_PUBLIC_FACEBOOK_SECRET=${NEXT_PUBLIC_FACEBOOK_SECRET}" >> app/driver/.env
    - echo "NEXT_PUBLIC_GITHUB_ID=${NEXT_PUBLIC_GITHUB_ID}" >> app/driver/.env
    - echo "NEXT_PUBLIC_GITHUB_SECRET=${NEXT_PUBLIC_GITHUB_SECRET}" >> app/driver/.env
    - echo "NEXTAUTH_SECRET=${NEXTAUTH_SECRET}" >> app/driver/.env
    - echo "NEXTAUTH_URL=${NEXTAUTH_URL}" >> app/driver/.env
    - echo "NEXT_PUBLIC_AUTH_COOKIE_NAME=${NEXT_PUBLIC_AUTH_COOKIE_NAME}" >> app/driver/.env
  artifacts:
    paths:
      - app/driver/.env

setup-env-variables:marketing-app:
  stage: setup-env-variables
  script:
    - rm -f app/marketing/.env
    - echo "NEXT_PUBLIC_DRIVER_APP_URL=${NEXT_PUBLIC_DRIVER_APP_URL}" >> app/marketing/.env
  artifacts:
    paths:
      - app/marketing/.env

