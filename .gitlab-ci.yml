# Official framework image.
# https://hub.docker.com/r/library/node/tags/
# lts = Long Term Support
image: node:lts

services:
  - name: postgres:15
    alias: postgres

variables:
  PIPELINE: true
  POSTGRES_HOST: ${POSTGRES_HOST}
  POSTGRES_PORT: ${POSTGRES_PORT}
  POSTGRES_DB: ${POSTGRES_DB}
  POSTGRES_AUTH_DB: ${POSTGRES_AUTH_DB} 
  POSTGRES_VEHICLE_DB: ${POSTGRES_VEHICLE_DB}
  POSTGRES_PERMIT_DB: ${POSTGRES_PERMIT_DB}
  POSTGRES_TICKET_DB: ${POSTGRES_TICKET_DB}
  POSTGRES_USER: ${POSTGRES_USER}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  JWT_SECRET: ${JWT_SECRET}
  MICROSERVICE_INTERNAL_SECRET: ${MICROSERVICE_INTERNAL_SECRET}
  NEXT_PUBLIC_DRIVER_APP_URL: ${NEXT_PUBLIC_DRIVER_APP_URL}
  NEXT_PUBLIC_GOOGLE_ID: ${NEXT_PUBLIC_GOOGLE_ID}
  NEXT_PUBLIC_GOOGLE_SECRET: ${NEXT_PUBLIC_GOOGLE_SECRET}
  NEXT_PUBLIC_FACEBOOK_CLIENT_ID: ${NEXT_PUBLIC_FACEBOOK_CLIENT_ID}
  NEXT_PUBLIC_FACEBOOK_SECRET: ${NEXT_PUBLIC_FACEBOOK_SECRET}
  NEXT_PUBLIC_GITHUB_ID: ${NEXT_PUBLIC_GITHUB_ID}
  NEXT_PUBLIC_GITHUB_SECRET: ${NEXT_PUBLIC_GITHUB_SECRET}
  NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
  NEXTAUTH_URL: ${NEXTAUTH_URL}
  NEXT_PUBLIC_AUTH_COOKIE_NAME: ${NEXT_PUBLIC_AUTH_COOKIE_NAME}
  EMAIL_USER: ${EMAIL_USER}
  EMAIL_PASS: ${EMAIL_PASS}
  EMAIL_HOST: ${EMAIL_HOST}
  EMAIL_PORT: ${EMAIL_PORT}
  SMTP_PORT: ${SMTP_PORT}
  GOOGLE_GEMINI_KEY: ${GOOGLE_GEMINI_KEY}
  STRIPE_SECRET: ${STRIPE_SECRET}
  STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}

stages:
  - quality
  - build
  - test
  - setup-env-variables
  - conatainerize
  - deploy

.setup-db: &db_setup_script
  - apt-get update && apt-get install -y postgresql-client
  - until pg_isready -h postgres -p 5432; do sleep 1; done
  - PGPASSWORD=$POSTGRES_PASSWORD psql -h postgres -U "$POSTGRES_USER" -d postgres -f "./microservice/AuthService/sql/databases.sql"
  - PGPASSWORD=$POSTGRES_PASSWORD psql -h postgres -U "$POSTGRES_USER" -d auth -f "./microservice/AuthService/sql/schema.sql"
  - PGPASSWORD=$POSTGRES_PASSWORD psql -h postgres -U "$POSTGRES_USER" -d auth -f "./microservice/AuthService/sql/data.sql"
  # - PGPASSWORD=$POSTGRES_PASSWORD psql -h postgres -U "$POSTGRES_USER" -d postgres -f "./microservice/AdminService/sql/databases.sql"
  - PGPASSWORD=$POSTGRES_PASSWORD psql -h postgres -U "$POSTGRES_USER" -d auth -f "./microservice/AdminService/sql/schema.sql"
  - PGPASSWORD=$POSTGRES_PASSWORD psql -h postgres -U "$POSTGRES_USER" -d auth -f "./microservice/AdminService/sql/data.sql"
  - PGPASSWORD=$POSTGRES_PASSWORD psql -h postgres -U "$POSTGRES_USER" -d postgres -f "./microservice/VehicleService/sql/databases.sql"
  - PGPASSWORD=$POSTGRES_PASSWORD psql -h postgres -U "$POSTGRES_USER" -d vehc -f "./microservice/VehicleService/sql/schema.sql"
  - PGPASSWORD=$POSTGRES_PASSWORD psql -h postgres -U "$POSTGRES_USER" -d vehc -f "./microservice/VehicleService/sql/data.sql"
  - PGPASSWORD=$POSTGRES_PASSWORD psql -h postgres -U "$POSTGRES_USER" -d postgres -f "./microservice/TicketService/sql/databases.sql"
  - PGPASSWORD=$POSTGRES_PASSWORD psql -h postgres -U "$POSTGRES_USER" -d ticket -f "./microservice/TicketService/sql/schema.sql"
  - PGPASSWORD=$POSTGRES_PASSWORD psql -h postgres -U "$POSTGRES_USER" -d ticket -f "./microservice/TicketService/sql/data.sql"
  - PGPASSWORD=$POSTGRES_PASSWORD psql -h postgres -U "$POSTGRES_USER" -d postgres -f "./microservice/PermitService/sql/databases.sql"
  - PGPASSWORD=$POSTGRES_PASSWORD psql -h postgres -U "$POSTGRES_USER" -d perm -f "./microservice/PermitService/sql/schema.sql"
  - PGPASSWORD=$POSTGRES_PASSWORD psql -h postgres -U "$POSTGRES_USER" -d perm -f "./microservice/PermitService/sql/data.sql"
  - PGPASSWORD=$POSTGRES_PASSWORD psql -h postgres -U "$POSTGRES_USER" -d postgres -f "./microservice/PaymentService/sql/databases.sql"
  - PGPASSWORD=$POSTGRES_PASSWORD psql -h postgres -U "$POSTGRES_USER" -d payment -f "./microservice/PaymentService/sql/schema.sql"
  - PGPASSWORD=$POSTGRES_PASSWORD psql -h postgres -U "$POSTGRES_USER" -d payment -f "./microservice/PaymentService/sql/data.sql"

