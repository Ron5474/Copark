# Official framework image.
# https://hub.docker.com/r/library/node/tags/
# lts = Long Term Support
image: node:lts

services:
  - postgres

variables:
  PIPELINE: true
  POSTGRES_HOST: ${POSTGRES_HOST}
  POSTGRES_PORT: ${POSTGRES_PORT}
  POSTGRES_DB: ${POSTGRES_DB}
  POSTGRES_USER: ${POSTGRES_USER}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  # MASTER_SECRET: not-a-very-secret-secret
  NEXT_PUBLIC_GOOGLE_ID: ${NEXT_PUBLIC_GOOGLE_ID}
  NEXT_PUBLIC_GOOGLE_SECRET: ${NEXT_PUBLIC_GOOGLE_SECRET}
  NEXT_PUBLIC_FACEBOOK_CLIENT_ID: ${NEXT_PUBLIC_FACEBOOK_CLIENT_ID}
  NEXT_PUBLIC_FACEBOOK_SECRET: ${NEXT_PUBLIC_FACEBOOK_SECRET}
  NEXT_PUBLIC_GITHUB_ID: ${NEXT_PUBLIC_GITHUB_ID}
  NEXT_PUBLIC_GITHUB_SECRET: ${NEXT_PUBLIC_GITHUB_SECRET}
  NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}

stages:
  - quality
  - build
  - test
  - deploy

# .test_template: &test_template
#   stage: test
#   before_script:
#     - npm installs

lint:
  stage: quality 
  script:
    - npm run installs
    - npm run lint

build:
  stage: build
  script:
    - npm run installs
    - npm run build

# test:
#   stage: test
#   script:
#     - npm run installs
#     - npm test
test:driver:
  <<: *test_template
  script:
    - cd app/driver && npm install && npm test
  rules:
    - changes: 
      - app/driver/**/*
      - package.json
      - .gitlab-ci.yml

deploy:
  stage: deploy
  script: echo "Define your deployment script!"
  environment: production