      - app/admin/**/*
      - package.json
      - .gitlab-ci.yml

test:driver:
  script:
    - cd app/driver && npm install && npm test
  rules:
    - changes: 
      - app/driver/**/*
      - package.json
      - .gitlab-ci.yml

